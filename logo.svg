<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#a0002a"/>
      <stop offset="100%" stop-color="#500010"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C5A059" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C5A059" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square base -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="100" fill="url(#glow)"/>

  <!-- Outer ornamental border -->
  <rect x="28" y="28" width="456" height="456" rx="80" fill="none" stroke="#C5A059" stroke-width="2" opacity="0.5"/>
  <!-- Inner ornamental border -->
  <rect x="44" y="44" width="424" height="424" rx="68" fill="none" stroke="#C5A059" stroke-width="1" opacity="0.25"/>

  <!-- Corner brackets - Top Left -->
  <path d="M68 96 L68 68 L96 68" fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Corner brackets - Top Right -->
  <path d="M416 68 L444 68 L444 96" fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Corner brackets - Bottom Left -->
  <path d="M68 416 L68 444 L96 444" fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Corner brackets - Bottom Right -->
  <path d="M416 444 L444 444 L444 416" fill="none" stroke="#C5A059" stroke-width="3" stroke-linecap="round" opacity="0.9"/>

  <!-- Crown at top -->
  <!-- Crown base bar -->
  <rect x="176" y="178" width="160" height="14" rx="4" fill="#C5A059"/>
  <!-- Crown left point -->
  <polygon points="176,178 192,132 216,168" fill="#C5A059"/>
  <!-- Crown center point (tallest) -->
  <polygon points="236,178 256,108 276,178" fill="#C5A059"/>
  <!-- Crown right point -->
  <polygon points="296,168 320,132 336,178" fill="#C5A059"/>
  <!-- Crown gems (dots on points) -->
  <circle cx="192" cy="130" r="8" fill="#fff" opacity="0.9"/>
  <circle cx="256" cy="105" r="10" fill="#fff" opacity="0.9"/>
  <circle cx="320" cy="130" r="8" fill="#fff" opacity="0.9"/>
  <!-- Crown gem inner dots -->
  <circle cx="192" cy="130" r="4" fill="#C5A059"/>
  <circle cx="256" cy="105" r="5" fill="#C5A059"/>
  <circle cx="320" cy="130" r="4" fill="#C5A059"/>

  <!-- Thin divider line below crown -->
  <line x1="160" y1="205" x2="352" y2="205" stroke="#C5A059" stroke-width="1" opacity="0.4"/>

  <!-- HC monogram using paths -->
  <!-- H left bar -->
  <rect x="132" y="228" width="28" height="130" rx="5" fill="#C5A059"/>
  <!-- H right bar -->
  <rect x="218" y="228" width="28" height="130" rx="5" fill="#C5A059"/>
  <!-- H crossbar -->
  <rect x="132" y="279" width="114" height="26" rx="5" fill="#C5A059"/>

  <!-- C arc using path -->
  <path d="M340 228
           Q268 228 268 293
           Q268 358 340 358
           L340 334
           Q294 334 294 293
           Q294 252 340 252
           Z"
        fill="#C5A059"/>
  <!-- C top cut -->
  <rect x="316" y="228" width="60" height="28" rx="0" fill="#C5A059" opacity="0"/>

  <!-- Gold sparkle ornament below HC -->
  <!-- Large center diamond -->
  <path d="M256 392 L262 404 L256 416 L250 404 Z" fill="#C5A059" opacity="0.9"/>
  <!-- Left small diamond -->
  <path d="M230 404 L234 410 L230 416 L226 410 Z" fill="#C5A059" opacity="0.55"/>
  <!-- Right small diamond -->
  <path d="M282 404 L286 410 L282 416 L278 410 Z" fill="#C5A059" opacity="0.55"/>
  <!-- Horizontal lines -->
  <line x1="196" y1="408" x2="222" y2="408" stroke="#C5A059" stroke-width="1.5" opacity="0.5"/>
  <line x1="290" y1="408" x2="316" y2="408" stroke="#C5A059" stroke-width="1.5" opacity="0.5"/>

  <!-- Tiny dot accents on horizontal lines -->
  <circle cx="209" cy="408" r="1.5" fill="#C5A059" opacity="0.7"/>
  <circle cx="303" cy="408" r="1.5" fill="#C5A059" opacity="0.7"/>
</svg>
